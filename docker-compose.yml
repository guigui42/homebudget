services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: homebudget
      POSTGRES_USER: homebudget
      POSTGRES_PASSWORD: homebudget
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./apps/api/sql:/docker-entrypoint-initdb.d:ro

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://homebudget:homebudget@db:5432/homebudget
    ports:
      - "8080:80"
    depends_on:
      - db

volumes:
  pgdata:
